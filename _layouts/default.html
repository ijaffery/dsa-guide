<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='.9'>⚡</text></svg>">

  <!-- MathJax for inline math rendering -->
  <script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
    }
  };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <!-- Top progress bar -->
  <div id="progress" class="progress-bar" style="width:0%"></div>

  <header class="site-header">
    <div class="container">
      <a class="site-title" href="{{ "/" | relative_url }}">⚡ C++ DSA Guide</a>
      <nav class="site-nav">
        <a href="#arrays--hashing" class="nav-link">Arrays</a>
        <a href="#two-pointers--sliding-window" class="nav-link">2 Pt</a>
        <a href="#stack--queue" class="nav-link">Stack</a>
        <a href="#binary-search" class="nav-link">Binary</a>
        <a href="#linked-lists" class="nav-link">Lists</a>
        <a href="#trees--tries" class="nav-link">Trees</a>
        <a href="#graphs" class="nav-link">Graphs</a>
        <a href="#dynamic-programming" class="nav-link">DP</a>
        <a href="#intervals--greedy" class="nav-link">Greedy</a>
        <a href="#matrices" class="nav-link">Matrices</a>
        <a href="#bit-manipulation" class="nav-link">Bits</a>
      </nav>
      <button class="menu-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main id="main" class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Built with ♥ using <a href="https://jekyllrb.com/">Jekyll</a> · <a href="https://pages.github.com/">GitHub Pages</a></p>
    </div>
  </footer>

  <script src="{{ "/assets/js/navigation.js" | relative_url }}"></script>
</body>
</html>
