# ─── GitHub Pages / Jekyll Configuration ───

title: DSA Concepts Guide
description: Master Data Structures & Algorithms with 83 concepts — arrays, trees, graphs, DP, and more. Pseudocode and notes for C++ and Python interview prep.
baseurl: "/dsa-guide"
url: ""

# GitHub Pages uses the `jekyll-paginate` and `minimal-light` themes
# or the default theme.  We use the `minimal-light` look-alike via
# the built-in `minima` theme, customised below.

# theme: minima  -- we serve assets/css/style.css directly; no SCSS pipeline needed

# ─── Plugins ───
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# ─── Markdown ───
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"

# ─── Permalink style ───
permalink: pretty

# ─── Defaults (so *.md files are processed through Jekyll) ───
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
