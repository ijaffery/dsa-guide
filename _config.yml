# ─── GitHub Pages / Jekyll Configuration ───

title: DSA Guide
og_image: /dsa-guide/assets/og-image.webp
twitter:
  site: "@ijaffery"
  card: summary_large_image
description: Master 83 essential DSA concepts with pseudocode — arrays, trees, graphs, DP, and more for technical interview prep.
url: "https://ijaffery.github.io"
baseurl: "/dsa-guide"

# ─── Plugins ───
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# ─── Markdown ───
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"

# ─── Permalink style ───
permalink: pretty

# ─── Defaults (so *.md files are processed through Jekyll) ───
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "compress"
